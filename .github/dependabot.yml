version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    cooldown:
      default-days: 14
      semver-major-days: 30
    groups:
      javascript:
        patterns:
          - "*"
    ignore:
      - dependency-name: "@types/react"
        update-types:
          - version-update:semver-major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    cooldown:
      default-days: 14
    groups:
      actions:
        patterns:
          - "*"
