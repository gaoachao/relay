name: Relay
options:
  bundleIdPrefix: com.gaoachao
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top
  minimumXcodeGenVersion: 2.41.0
settings:
  base:
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    SWIFT_VERSION: 5.10
targets:
  Relay:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    sources:
      - path: Relay
        excludes:
          - Resources
      - path: Relay/Resources
        excludes:
          - Info.plist
        buildPhase: resources
    info:
      path: Relay/Resources/Info.plist
      properties:
        CFBundleDisplayName: Relay
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - zh-Hans
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        NSCameraUsageDescription: Relay uses the camera to read labels on a control panel.
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        INFOPLIST_KEY_CFBundleName: Relay
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.gaoachao.relay
        PRODUCT_NAME: Relay
        SWIFT_OBJC_BRIDGING_HEADER: Relay/Infrastructure/Lynx/Relay-Bridging-Header.h
    scheme:
      gatherCoverageData: true
      testTargets: []
