<!doctype html>
<!-- biome-ignore lint/a11y/useValidLang: Rsbuild replaces this template value with zh-CN or en. -->
<html lang="<%= locale %>">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="<%= description %>" />
    <meta name="theme-color" content="#f7f7f5" />
    <meta name="color-scheme" content="light" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="<%= title %>" />
    <meta property="og:description" content="<%= description %>" />
    <link rel="alternate" hreflang="zh-CN" href="<%= alternatePrefix %>zh/" />
    <link rel="alternate" hreflang="en" href="<%= alternatePrefix %>en/" />
    <link rel="alternate" hreflang="x-default" href="<%= alternatePrefix %>en/" />
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
